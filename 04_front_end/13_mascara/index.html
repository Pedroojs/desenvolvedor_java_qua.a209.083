<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400;700;900&family=Raleway:wght@100;300;400;700;900&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <header class="header">
        <nav class="navbar bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="./img/african-mask.png" width="40" height="30" class="d-inline-block align-text-top">
                    Máscara de Entrada
                </a>
            </div>
        </nav>
    </header>

    <main class="container py-4">
        <h1 class="inicial">Formulário com Máscara de Entrada</h1>
        <hr>

        <form id="formUsuario">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="nome" class="form-label">Nome Completo:</label>
                    <input type="text" class="form-control" id="nome" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" class="form-control" id="email" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label for="nascimento" class="form-label">Data de Nascimento:</label>
                    <input type="text" class="form-control" id="nascimento" placeholder="DD/MM/AAAA" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label for="cpf" class="form-label">CPF:</label>
                    <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label for="telefone" class="form-label">Telefone:</label>
                    <input type="text" class="form-control" id="telefone" placeholder="(00) 00000-0000" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="cep" class="form-label">CEP:</label>
                    <input type="text" class="form-control" id="cep" placeholder="00000-000" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="endereco" class="form-label">Endereço:</label>
                    <input type="text" class="form-control" id="endereco" required>
                </div>
            </div>

            <button type="button" class="btn btn-primary" id="submit">Enviar</button>
        </form>

        <div class="row mt-4">
            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <h5 class="card-title">Dados do Usuário:</h5>
                    <h6 class="card-subtitle mb-2 text-body-secondary" id="nomeResult"></h6>
                    <p class="card-text" id="emailResult"></p>
                    <p class="card-text" id="nascimentoResult"></p>
                    <p class="card-text" id="cpfResult"></p>
                    <p class="card-text" id="telefoneResult"></p>
                    <p class="card-text" id="cepResult"></p>
                    <p class="card-text" id="enderecoResult"></p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="./index.js"></script>
</body>

</html>
